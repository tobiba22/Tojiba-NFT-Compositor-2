name: Release

# Triggers when you push a tag like v1.0.0 or v1.2.3
on:
  push:
    tags:
      - "v*.*.*"

# Grant the token permission to create/update GitHub Releases
permissions:
  contents: write

jobs:

  # ── Create the draft release first so both builders can upload to it ─────────
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body: ""
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows build ────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build and publish Windows release
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Mac build ────────────────────────────────────────────────────────────────
  build-mac:
    name: Build (macOS)
    runs-on: macos-latest
    needs: create-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build and publish Mac release
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish once both builds finish ─────────────────────────────────────────
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]

    steps:
      - name: Publish Release
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
